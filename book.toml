[book]
title = "Slime Rancher 2: A Practical Walkthrough"
authors = ["skelhammer"]
description = "Comprehensive, optimization-focused walkthrough for Slime Rancher 2"
language = "en"
multilingual = false
src = "."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/skelhammer/slime-rancher-2-guide"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/skelhammer/slime-rancher-2-guide/edit/main/{path}"
site-url = "/slime-rancher-2-guide/"
no-section-label = false
smart-punctuation = true
additional-css = ["pagetoc.css"]
additional-js = ["pagetoc.js"]

[output.html.fold]
enable = true
level = 1

[output.html.print]
enable = true

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
