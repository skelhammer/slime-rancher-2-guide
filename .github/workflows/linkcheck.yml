name: Link Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lychee:
    name: Check markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --accept '200,204,206,301,302,403,429'
            --exclude-path 'steam/'
            --exclude-path 'book/'
            --exclude 'wiki.slimerancher.com'
            --exclude 'monomipark.com'
            --exclude 'skelhammer.github.io'
            './**/*.md'
          fail: true
