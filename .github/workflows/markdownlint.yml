name: Markdown Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  markdownlint:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !steam/**
            !book/**
            !node_modules/**
            !SUMMARY.md
